function singularize(word) {
  if (word.endsWith("ies")) return word.slice(0, -3) + "y";
  if (word.endsWith("es") && word.length > 3) return word.slice(0, -2);
  if (word.endsWith("s") && !word.endsWith("ss")) return word.slice(0, -1);
  return word;
}

// Extract a leading quantity from text like "2 eggs", "1.5 cups rice", "6 oz chicken"
function extractQuantity(text) {
  const numWords = { one: 1, two: 2, three: 3, four: 4, five: 5, six: 6, seven: 7, eight: 8, a: 1, an: 1 };
  const match = text.match(/^(\d+(\.\d+)?|\d+\/\d+)\s*/);
  if (match) {
    let qty = match[1];
    if (qty.includes("/")) {
      const [n, d] = qty.split("/").map(Number);
      qty = n / d;
    } else {
      qty = parseFloat(qty);
    }
    return { qty, rest: text.slice(match[0].length).trim() };
  }
  const wordMatch = text.match(/^([a-z]+)\s+/);
  if (wordMatch && numWords[wordMatch[1]]) {
    return { qty: numWords[wordMatch[1]], rest: text.slice(wordMatch[0].length).trim() };
  }
  return { qty: 1, rest: text.trim() };
}

const UNIT_ALIASES = {
  cups: "cup", c: "cup",
  ounces: "oz", ounce: "oz",
  tablespoons: "tbsp", tablespoon: "tbsp", tbs: "tbsp",
  teaspoons: "tsp", teaspoon: "tsp",
  slices: "slice",
  scoops: "scoop",
  bars: "bar",
  eggs: "egg",
  grams: "g", gram: "g",
};

function stripUnitWord(text) {
  const words = text.split(" ");
  if (words.length > 1) {
    const first = words[0].toLowerCase();
    const normalized = UNIT_ALIASES[first] || first;
    const knownUnits = ["cup", "oz", "tbsp", "tsp", "slice", "scoop", "bar", "egg", "g", "medium", "large", "small"];
    if (knownUnits.includes(normalized)) {
      return { unit: normalized, rest: words.slice(1).join(" ") };
    }
  }
  return { unit: null, rest: text };
}

/**
 * Parses a free-text food entry like "2 eggs" or "6 oz chicken breast"
 * Returns { matched: bool, name, cal, p, c, f, qty, unit }
 */
function estimateFood(input) {
  const raw = input.trim().toLowerCase();
  if (!raw) return null;

  const { qty, rest } = extractQuantity(raw);
  const { unit: parsedUnit, rest: foodText } = stripUnitWord(rest);
  const cleanedFoodText = foodText.replace(/^of\s+/, "").trim();
  const singularFoodText = cleanedFoodText
    .split(" ")
    .map(singularize)
    .join(" ");

  // Find best match: exact key match preferred, then substring match
  let best = null;
  let bestScore = 0;
  for (const item of FOOD_DB) {
    for (const key of item.keys) {
      if (cleanedFoodText === key || singularFoodText === key) {
        best = item; bestScore = 100; break;
      }
      if (cleanedFoodText.includes(key) || key.includes(cleanedFoodText)) {
        const score = key.length;
        if (score > bestScore) { best = item; bestScore = score; }
      }
    }
    if (bestScore === 100) break;
  }

  if (!best) {
    return { matched: false, name: input, qty, cal: 0, p: 0, c: 0, f: 0 };
  }

  // Determine multiplier
  let multiplier = qty;
  if (parsedUnit && parsedUnit !== best.unit) {
    if (parsedUnit === "g" && best.grams) {
      multiplier = qty / best.grams;
    }
    // otherwise just trust qty as "number of base units" even if labeled differently
  }

  return {
    matched: true,
    name: input,
    qty,
    unit: best.unit,
    cal: Math.round(best.cal * multiplier),
    p: Math.round(best.p * multiplier * 10) / 10,
    c: Math.round(best.c * multiplier * 10) / 10,
    f: Math.round(best.f * multiplier * 10) / 10,
  };
}

function sumMacros(items) {
  return items.reduce(
    (acc, item) => ({
      cal: acc.cal + (item.cal || 0),
      p: acc.p + (item.p || 0),
      c: acc.c + (item.c || 0),
      f: acc.f + (item.f || 0),
    }),
    { cal: 0, p: 0, c: 0, f: 0 }
  );
}

function todayKey(d = new Date()) { return d.toISOString().slice(0, 10); }
function fmtDate(d) { return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" }); }
function fmtDateLong(d) { return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" }); }
function fmtShort(d) { return d.toLocaleDateString("en-US", { month: "numeric", day: "numeric" }); }
function addDays(d, n) { return new Date(d.getTime() + n * DAY_MS); }

/* ---------------------------------------------------------
   16-WEEK MARATHON PLAN
--------------------------------------------------------- */
function buildDefaultPlan() {
  const longRuns = [8, 10, 8, 11, 13, 9, 14, 16, 10, 17, 19, 11, 20, 12, 8, 0];
  const weekFocus = [
    "Base building", "Base building", "Recovery week", "Base + tempo",
    "Endurance", "Recovery week", "Endurance", "Peak long run",
    "Recovery week", "Peak long run", "Peak long run (longest)", "Recovery week",
    "Final peak long run", "Taper begins", "Taper", "Race week"
  ];
  const plan = [];
  for (let w = 0; w < 16; w++) {
    const weekStart = addDays(PLAN_START, w * 7);
    const isRaceWeek = w === 15;
    const days = [];
    for (let d = 0; d < 7; d++) {
      const date = addDays(weekStart, d);
      let workout = null;
      if (d === 6) {
        workout = isRaceWeek
          ? { type: "race", label: "MARATHON RACE DAY", distance: 26.2 }
          : { type: "long", label: "Long run", distance: longRuns[w] };
      } else if (d === 0) {
        workout = { type: "strength", label: "Strength: Day A", distance: 0 };
      } else if (d === 1) {
        workout = { type: "easy", label: "Easy run", distance: isRaceWeek ? 0 : 4 };
      } else if (d === 2) {
        workout = isRaceWeek
          ? { type: "rest", label: "Rest", distance: 0 }
          : { type: "strength", label: "Strength: Day B", distance: 0 };
      } else if (d === 3) {
        workout = { type: "easy", label: "Easy run", distance: isRaceWeek ? 0 : 4 };
      } else if (d === 4) {
        workout = isRaceWeek
          ? { type: "rest", label: "Rest", distance: 0 }
          : { type: "strength", label: "Strength: Day C", distance: 0 };
      } else if (d === 5) {
        workout = isRaceWeek
          ? { type: "rest", label: "Rest - shake out 2mi easy", distance: 2 }
          : { type: "easy", label: "Easy run + strides", distance: 3 };
      }
      days.push({ date: todayKey(date), workout });
    }
    plan.push({ week: w + 1, focus: weekFocus[w], weekStart: todayKey(weekStart), days });
  }
  return plan;
}

];

/* ---------------------------------------------------------
   STORAGE HELPERS
--------------------------------------------------------- */
async function storageGet(key, fallback) {
  try {
    const raw = window.localStorage.getItem("marathon-app:" + key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
async function storageSet(key, value) {
  try { window.localStorage.setItem("marathon-app:" + key, JSON.stringify(value)); }
  catch (e) { console.error("storage set failed", e); }
}

/* ---------------------------------------------------------
   SHARED UI
--------------------------------------------------------- */
function Pill({ children, color }) {
  return (
    <span style={{ background: color + "20", color, border: `1px solid ${color}50` }}
      className="text-[11px] font-mono uppercase tracking-wider px-2 py-0.5 rounded-full whitespace-nowrap">
      {children}
    </span>
  );
}
function SectionLabel({ children }) {
  return <div className="font-mono text-[11px] uppercase tracking-[0.15em] text-[#8B93A1] mb-2">{children}</div>;
}
function Card({ children, className = "" }) {
  return (
    <div className={`bg-[#F7F3EC] rounded-2xl p-4 shadow-sm ${className}`} style={{ border: "1px solid #E5DECC" }}>
      {children}
    </div>
  );
}
function EmptyState({ icon: Icon, title, body }) {
  return (
    <div className="flex flex-col items-center text-center py-10 px-6">
      <div className="w-12 h-12 rounded-full flex items-center justify-center mb-3" style={{ background: "#E5DECC" }}>
        <Icon size={20} color="#8B93A1" />

      <div className="font-serif text-[17px] text-[#1A2333] mb-1">{title}</div>
      <div className="text-[13px] text-[#8B93A1] leading-snug max-w-[220px]">{body}</div>
    </div>

}
function MacroBar({ label, value, target, color }) {
  const pct = target > 0 ? Math.min(100, (value / target) * 100) : 0;
  return (
    <div>
      <div className="flex items-center justify-between mb-1">
        <span className="text-[11px] font-mono uppercase tracking-wide text-[#8B93A1]">{label}</span>
        <span className="text-[12px] font-mono text-[#1A2333]">{Math.round(value)}<span className="text-[#8B93A1]">/{target}g</span></span>
      </div>
      <div className="h-1.5 rounded-full bg-[#E5DECC] overflow-hidden">
        <div className="h-full rounded-full" style={{ width: `${pct}%`, background: color, transition: "width 0.4s ease" }} />
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   TODAY VIEW
--------------------------------------------------------- */
function TodayRing({ daysLeft, totalDays }) {
  const pct = Math.max(0, Math.min(1, 1 - daysLeft / totalDays));
  const r = 54, circ = 2 * Math.PI * r, offset = circ * (1 - pct);
  return (
    <div className="relative w-[140px] h-[140px] mx-auto">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r={r} fill="none" stroke="#2A3548" strokeWidth="10" />
        <circle cx="70" cy="70" r={r} fill="none" stroke="#D9622B" strokeWidth="10"
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          transform="rotate(-90 70 70)" style={{ transition: "stroke-dashoffset 0.6s ease" }} />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div className="font-mono text-[34px] leading-none text-[#F7F3EC]">{daysLeft}</div>
        <div className="font-mono text-[10px] uppercase tracking-widest text-[#8B93A1] mt-1">days to go</div>
      </div>
    </div>
  );
}

  const todaysWorkout = weekInfo?.days.find(d => d.date === key)?.workout;

  const strengthDone = !!dayLogs.strengthDone;

      {todaysWorkout && (
        <Card className="!bg-[#1A2333] !border-[#2A3548]">
          <div className="flex items-center justify-between mb-1">
            <SectionLabel>Today's Plan</SectionLabel>
            <Pill color={WORKOUT_COLORS[todaysWorkout.type]}>{WORKOUT_LABELS[todaysWorkout.type]}</Pill>
          </div>
          <div className="font-serif text-[19px] text-[#F7F3EC]">{todaysWorkout.label}</div>
          {todaysWorkout.distance > 0 && (
            <div className="font-mono text-[13px] text-[#8B93A1] mt-1">{todaysWorkout.distance} mi target</div>
          )}
        </Card>
      )}

      <div>
        <SectionLabel>Nutrition Today</SectionLabel>
        <Card>
          <div className="flex items-center justify-between mb-3">
            <div>
              <div className="font-mono text-[26px] text-[#1A2333] leading-none">{Math.round(macros.cal)}</div>
              <div className="text-[11px] text-[#8B93A1] mt-0.5">of {targets.cal} cal</div>
            </div>
            <button onClick={() => openLogger("meals")} className="px-3 py-1.5 rounded-full bg-[#1A2333] text-[#F7F3EC] text-[12px] font-medium">
              Log food
            </button>
          </div>
          <div className="space-y-2">
            <MacroBar label="Protein" value={macros.p} target={targets.p} color="#D9622B" />
            <MacroBar label="Carbs" value={macros.c} target={targets.c} color="#6B8F71" />
            <MacroBar label="Fat" value={macros.f} target={targets.f} color="#6B5BA0" />
          </div>
        </Card>
      </div>

      <div>
        <SectionLabel>Today's Log</SectionLabel>
        <div className="grid grid-cols-2 gap-3">
          <button onClick={() => openLogger("cardio")} className="text-left">
            <Card className="!p-3">
              <div className="flex items-center justify-between">
                <Activity size={18} color="#D9622B" />
                <span className="font-mono text-[20px] text-[#1A2333]">{cardioCount}</span>
              </div>
              <div className="text-[12px] text-[#5C6470] mt-1">Cardio logged</div>

          </button>
          <button onClick={() => openLogger("strength")} className="text-left">
            <Card className="!p-3">
              <div className="flex items-center justify-between">
                <Dumbbell size={18} color="#5C6470" />
                {strengthDone ? <Check size={18} color="#6B8F71" /> : <span className="font-mono text-[20px] text-[#1A2333]">—</span>}
              </div>
              <div className="text-[12px] text-[#5C6470] mt-1">Strength</div>
            </Card>
          </button>
          <button onClick={() => openLogger("water")} className="text-left">
            <Card className="!p-3">
              <div className="flex items-center justify-between">
                <Droplet size={18} color="#3D7EA6" />

              </div>
              <div className="text-[12px] text-[#5C6470] mt-1">Cups of water</div>
            </Card>
          </button>
          <button onClick={() => openLogger("sleep")} className="text-left">
            <Card className="!p-3">
              <div className="flex items-center justify-between">
                <Moon size={18} color="#6B5BA0" />

/* ---------------------------------------------------------
   LOG MODAL
--------------------------------------------------------- */
function LogModal({ mode, date, dayLogs, onClose, onSave }) {
  const [cardioForm, setCardioForm] = useState({ activity: "Running", distance: "", time: "", notes: "" });
  const [mealSlot, setMealSlot] = useState("breakfast");
  const [foodInput, setFoodInput] = useState("");
  const [preview, setPreview] = useState(null);
  const [waterCups, setWaterCups] = useState(dayLogs.water || 0);
  const [sleepHours, setSleepHours] = useState(dayLogs.sleep || "");
  const [weightVal, setWeightVal] = useState(dayLogs.weight || "");
  const [noteText, setNoteText] = useState(dayLogs.note || "");
  const [strengthDayId, setStrengthDayId] = useState(dayLogs.strengthDayId || STRENGTH_PLAN[0].id);
  const [completedSets, setCompletedSets] = useState(dayLogs.completedSets || {});
  const [strengthNotes, setStrengthNotes] = useState(dayLogs.strengthNotes || "");

  const title = {
    cardio: "Log Cardio", meals: "Log Meals", water: "Log Water",
    sleep: "Log Sleep", weight: "Log Weight", note: "Add a Comment", strength: "Log Strength",
  }[mode];

  function saveCardio() {
    if (!cardioForm.activity) return;
    const entry = { id: Date.now().toString(), ...cardioForm };
    onSave({ cardio: [...(dayLogs.cardio || []), entry] });
    setCardioForm({ activity: "Running", distance: "", time: "", notes: "" });
  }

  function handlePreview() {
    if (!foodInput.trim()) { setPreview(null); return; }
    setPreview(estimateFood(foodInput));
  }

  function addFood() {
    if (!preview) return;
    const meals = { ...(dayLogs.meals || {}) };
    meals[mealSlot] = [...(meals[mealSlot] || []), preview];
    onSave({ meals });
    setFoodInput(""); setPreview(null);
  }

  function removeFood(slot, idx) {
    const meals = { ...(dayLogs.meals || {}) };
    meals[slot] = meals[slot].filter((_, i) => i !== idx);
    onSave({ meals });
  }

  function adjustPreviewField(field, val) {
    setPreview(p => ({ ...p, [field]: val === "" ? 0 : Number(val) }));
  }

  function saveWater() { onSave({ water: waterCups }); }
  function saveSleep() { onSave({ sleep: sleepHours === "" ? null : Number(sleepHours) }); }
  function saveWeight() { onSave({ weight: weightVal === "" ? null : Number(weightVal) }); }
  function saveNote() { onSave({ note: noteText }); }

  function toggleSet(exIdx, setIdx) {
    const key = `${exIdx}-${setIdx}`;
    const updated = { ...completedSets, [key]: !completedSets[key] };
    setCompletedSets(updated);
    onSave({ completedSets: updated, strengthDayId });
  }
  function finishStrength() {
    onSave({ strengthDone: true, strengthDayId, completedSets, strengthNotes });
  }

  const currentDay = STRENGTH_PLAN.find(d => d.id === strengthDayId);
  const allMealItems = ["breakfast", "lunch", "dinner", "snacks"].flatMap(slot =>
    (dayLogs.meals?.[slot] || []).map((item, idx) => ({ ...item, slot, idx }))
  );
  const dayTotals = sumMacros(allMealItems);

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center">
      <div className="absolute inset-0 bg-black/50" onClick={onClose} />
      <div className="relative w-full max-w-md bg-[#F7F3EC] rounded-t-3xl max-h-[88vh] overflow-y-auto pb-8 animate-slideup">
        <div className="sticky top-0 bg-[#F7F3EC] flex items-center justify-between px-5 pt-5 pb-3 border-b border-[#E5DECC] z-10">
          <div>
            <div className="font-mono text-[10px] uppercase tracking-widest text-[#8B93A1]">{fmtDate(date)}</div>
            <h2 className="font-serif text-[20px] text-[#1A2333]">{title}</h2>
          </div>
          <button onClick={onClose} className="w-8 h-8 rounded-full bg-[#E5DECC] flex items-center justify-center">
            <X size={16} color="#5C6470" />
          </button>
        </div>

        <div className="px-5 py-4 space-y-4">
          {mode === "cardio" && (
            <>
              <div>
                <SectionLabel>Activity</SectionLabel>
                <div className="flex gap-2 flex-wrap">
                  {["Running", "Elliptical", "Cycling", "Swimming", "Walking", "Other"].map(a => (
                    <button key={a} onClick={() => setCardioForm(f => ({ ...f, activity: a }))}
                      className="px-3 py-1.5 rounded-full text-[13px] font-medium"
                      style={{ background: cardioForm.activity === a ? "#D9622B" : "#E5DECC", color: cardioForm.activity === a ? "#F7F3EC" : "#5C6470" }}>
                      {a}
                    </button>
                  ))}
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <SectionLabel>Distance (mi)</SectionLabel>
                  <input type="number" inputMode="decimal" placeholder="0.0" value={cardioForm.distance}
                    onChange={e => setCardioForm(f => ({ ...f, distance: e.target.value }))}
                    className="w-full px-3 py-2.5 rounded-xl bg-white font-mono text-[16px] text-[#1A2333] outline-none" style={{ border: "1px solid #E5DECC" }} />
                </div>
                <div>
                  <SectionLabel>Time</SectionLabel>
                  <input type="text" placeholder="mm:ss or h:mm" value={cardioForm.time}
                    onChange={e => setCardioForm(f => ({ ...f, time: e.target.value }))}
                    className="w-full px-3 py-2.5 rounded-xl bg-white font-mono text-[16px] text-[#1A2333] outline-none" style={{ border: "1px solid #E5DECC" }} />
                </div>
              </div>
              <div>
                <SectionLabel>Comments</SectionLabel>
                <textarea placeholder="How did it feel? Weather, effort, anything notable..." value={cardioForm.notes}
                  onChange={e => setCardioForm(f => ({ ...f, notes: e.target.value }))} rows={3}
                  className="w-full px-3 py-2.5 rounded-xl bg-white text-[14px] text-[#1A2333] outline-none resize-none" style={{ border: "1px solid #E5DECC" }} />
              </div>
              <button onClick={saveCardio} className="w-full py-3 rounded-xl bg-[#1A2333] text-[#F7F3EC] font-medium text-[15px]">Save Activity</button>
              {(dayLogs.cardio || []).length > 0 && (
                <div className="pt-2">

                  <div className="space-y-2">
                    {dayLogs.cardio.map(c => (

                          {c.notes && <div className="text-[12px] text-[#5C6470] mt-1">{c.notes}</div>}
                        </div>
                        <button onClick={() => onSave({ cardio: dayLogs.cardio.filter(x => x.id !== c.id) })} className="p-1">
                          <Trash2 size={14} color="#B23A48" />
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </>
          )}

          {mode === "strength" && (
            <>
              <div>
                <SectionLabel>Choose Workout</SectionLabel>
                <div className="flex flex-col gap-2">
                  {STRENGTH_PLAN.map(d => (
                    <button key={d.id} onClick={() => setStrengthDayId(d.id)}
                      className="px-3 py-2 rounded-xl text-left text-[13px] font-medium"
                      style={{ background: strengthDayId === d.id ? "#1A2333" : "#E5DECC", color: strengthDayId === d.id ? "#F7F3EC" : "#5C6470" }}>
                      {d.name}
                    </button>
                  ))}
                </div>
              </div>
              <div className="text-[12px] text-[#8B93A1] italic">{currentDay.warmup}</div>
              <div className="space-y-3">
                {currentDay.exercises.map((ex, exIdx) => (
                  <div key={exIdx} className="bg-white rounded-xl p-3" style={{ border: "1px solid #E5DECC" }}>
                    <div className="text-[14px] font-medium text-[#1A2333]">{ex.name}</div>

                    <div className="flex gap-1.5 mt-2">
                      {Array.from({ length: ex.sets }).map((_, setIdx) => {
                        const key = `${exIdx}-${setIdx}`;
                        const done = completedSets[key];
                        return (
                          <button key={setIdx} onClick={() => toggleSet(exIdx, setIdx)}
                            className="w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-mono"
                            style={{ background: done ? "#6B8F71" : "#E5DECC", color: done ? "white" : "#8B93A1" }}>

                      })}
                    </div>
                  </div>
                ))}
              </div>
              <div>
                <SectionLabel>Comments</SectionLabel>
                <textarea placeholder="How did it feel? Weights used, energy level..." value={strengthNotes}
                  onChange={e => setStrengthNotes(e.target.value)} rows={3}
                  className="w-full px-3 py-2.5 rounded-xl bg-white text-[14px] text-[#1A2333] outline-none resize-none" style={{ border: "1px solid #E5DECC" }} />

          {mode === "meals" && (

          {mode === "note" && (

  );
}

function TrainingPlanView({ plan, today, logs, onSelectDay }) {
  const currentWeekIdx = plan.findIndex(w => w.days.some(d => d.date === todayKey(today)));
  const [activeWeek, setActiveWeek] = useState(Math.max(0, currentWeekIdx));
  const week = plan[activeWeek];

  return (
    <div className="px-4 pt-2 pb-4">
      <div className="text-center mb-4 pt-2">
        <div className="font-mono text-[11px] uppercase tracking-[0.2em] text-[#8B93A1] mb-1">16-Week Plan</div>
        <h1 className="font-serif text-[24px] text-[#F7F3EC]">Marathon Training</h1>
        <div className="text-[12px] text-[#8B93A1] mt-1">Race day: {fmtDate(RACE_DATE)} · Edit any day to fit your real plan</div>
      </div>

      <div className="flex items-center justify-between mb-3">
        <button onClick={() => setActiveWeek(w => Math.max(0, w - 1))} disabled={activeWeek === 0} className="p-2 rounded-full bg-[#1A2333] disabled:opacity-30">
          <ChevronLeft size={16} color="#F7F3EC" />
        </button>
        <div className="text-center">
          <div className="font-mono text-[12px] text-[#8B93A1]">WEEK {week.week} OF 16</div>
          <div className="font-serif text-[16px] text-[#F7F3EC]">{week.focus}</div>
        </div>
        <button onClick={() => setActiveWeek(w => Math.min(plan.length - 1, w + 1))} disabled={activeWeek === plan.length - 1} className="p-2 rounded-full bg-[#1A2333] disabled:opacity-30">
          <ChevronRight size={16} color="#F7F3EC" />
        </button>
      </div>

      <div className="space-y-2">
        {week.days.map(day => {
          const d = new Date(day.date + "T00:00:00");
          const isToday = day.date === todayKey(today);
          const dayLogs = logs[day.date] || {};
          const completed = (dayLogs.cardio || []).length > 0 || dayLogs.strengthDone;
          const w = day.workout;
          return (
            <button key={day.date} onClick={() => onSelectDay(day.date)} className="w-full text-left">
              <Card className={isToday ? "!border-[#D9622B] !border-2" : ""}>
                <div className="flex items-center gap-3">
                  <div className="flex flex-col items-center w-10">
                    <div className="font-mono text-[10px] text-[#8B93A1] uppercase">{d.toLocaleDateString("en-US", { weekday: "short" })}</div>
                    <div className="font-serif text-[18px] text-[#1A2333]">{d.getDate()}</div>
                  </div>
                  <div className="w-px h-9 bg-[#E5DECC]" />
                  <div className="flex-1">
                    <div className="flex items-center gap-2">
                      <span className="text-[14px] font-medium text-[#1A2333]">{w?.label}</span>
                      {completed && <Check size={14} color="#6B8F71" />}
                    </div>
                    {w?.distance > 0 && <div className="font-mono text-[12px] text-[#8B93A1]">{w.distance} mi</div>}
                  </div>
                  {w && <Pill color={WORKOUT_COLORS[w.type]}>{WORKOUT_LABELS[w.type]}</Pill>}
                </div>
              </Card>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   WORKOUT LIBRARY VIEW
--------------------------------------------------------- */
function LibraryView({ library, setLibrary }) {
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name: "", category: "Run", notes: "" });

  function startNew() { setForm({ name: "", category: "Run", notes: "" }); setEditing("new"); }
  function startEdit(item) { setForm({ name: item.name, category: item.category, notes: item.notes }); setEditing(item.id); }
  function save() {
    if (!form.name.trim()) return;
    if (editing === "new") setLibrary([...library, { id: Date.now().toString(), ...form }]);
    else setLibrary(library.map(item => item.id === editing ? { ...item, ...form } : item));
    setEditing(null);
  }
  function remove(id) { setLibrary(library.filter(item => item.id !== id)); }

  return (
    <div className="px-4 pt-2 pb-4">
      <div className="text-center mb-4 pt-2">
        <div className="font-mono text-[11px] uppercase tracking-[0.2em] text-[#8B93A1] mb-1">Reference</div>
        <h1 className="font-serif text-[24px] text-[#F7F3EC]">Run Workouts</h1>
        <div className="text-[12px] text-[#8B93A1] mt-1">Saved run workout types for quick reference</div>
      </div>
      <button onClick={startNew} className="w-full mb-3 py-3 rounded-xl border-2 border-dashed flex items-center justify-center gap-2" style={{ borderColor: "#3A4456", color: "#8B93A1" }}>
        <Plus size={16} /> <span className="text-[14px] font-medium">Add a workout</span>
      </button>
      <div className="space-y-2">
        {library.map(item => (
          <Card key={item.id}>
            <div className="flex items-start justify-between">
              <div className="flex-1">
                <div className="flex items-center gap-2">
                  <span className="font-serif text-[16px] text-[#1A2333]">{item.name}</span>
                  <Pill color="#5C6470">{item.category}</Pill>
                </div>
                <div className="text-[13px] text-[#5C6470] mt-1 leading-relaxed">{item.notes}</div>
              </div>
              <div className="flex gap-1 ml-2">
                <button onClick={() => startEdit(item)} className="p-1.5"><Edit3 size={14} color="#8B93A1" /></button>
                <button onClick={() => remove(item.id)} className="p-1.5"><Trash2 size={14} color="#B23A48" /></button>
              </div>
            </div>
          </Card>
        ))}
        {library.length === 0 && <EmptyState icon={BookOpen} title="No workouts saved" body="Add the workouts you've used in your training so they're handy for reference." />}
      </div>
      {editing && (
        <div className="fixed inset-0 z-50 flex items-end justify-center">
          <div className="absolute inset-0 bg-black/50" onClick={() => setEditing(null)} />
          <div className="relative w-full max-w-md bg-[#F7F3EC] rounded-t-3xl pb-8">
            <div className="flex items-center justify-between px-5 pt-5 pb-3 border-b border-[#E5DECC]">
              <h2 className="font-serif text-[20px] text-[#1A2333]">{editing === "new" ? "New Workout" : "Edit Workout"}</h2>
              <button onClick={() => setEditing(null)} className="w-8 h-8 rounded-full bg-[#E5DECC] flex items-center justify-center"><X size={16} color="#5C6470" /></button>
            </div>
            <div className="px-5 py-4 space-y-4">
              <div>
                <SectionLabel>Name</SectionLabel>
                <input value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="e.g. Hill Repeats"
                  className="w-full px-3 py-2.5 rounded-xl bg-white text-[15px] text-[#1A2333] outline-none" style={{ border: "1px solid #E5DECC" }} />
              </div>
              <div>
                <SectionLabel>Category</SectionLabel>
                <div className="flex gap-2 flex-wrap">
                  {["Run", "Strength", "Cross-train", "Recovery"].map(c => (
                    <button key={c} onClick={() => setForm(f => ({ ...f, category: c }))} className="px-3 py-1.5 rounded-full text-[13px] font-medium"
                      style={{ background: form.category === c ? "#1A2333" : "#E5DECC", color: form.category === c ? "#F7F3EC" : "#5C6470" }}>
                      {c}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <SectionLabel>Details</SectionLabel>
                <textarea value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} rows={4} placeholder="Describe the workout..."
                  className="w-full px-3 py-2.5 rounded-xl bg-white text-[14px] text-[#1A2333] outline-none resize-none" style={{ border: "1px solid #E5DECC" }} />
              </div>
              <button onClick={save} className="w-full py-3 rounded-xl bg-[#1A2333] text-[#F7F3EC] font-medium text-[15px]">Save Workout</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------
   PROGRESS VIEW (charts)
--------------------------------------------------------- */
function ProgressView({ logs, today, targets }) {
  const [range, setRange] = useState(14);

  const data = useMemo(() => {
    return Array.from({ length: range }).map((_, i) => {
      const d = addDays(today, -(range - 1) + i);
      const key = todayKey(d);
      const dayLogs = logs[key] || {};
      const allMeals = [...(dayLogs.meals?.breakfast || []), ...(dayLogs.meals?.lunch || []), ...(dayLogs.meals?.dinner || []), ...(dayLogs.meals?.snacks || [])];
      const macros = sumMacros(allMeals);
      const cardioMiles = (dayLogs.cardio || []).reduce((s, c) => s + (parseFloat(c.distance) || 0), 0);
      return {
        date: fmtShort(d),
        weight: dayLogs.weight || null,
        sleep: dayLogs.sleep || null,
        water: dayLogs.water || 0,
        calories: macros.cal || null,
        protein: macros.p || null,
        miles: cardioMiles,
      };
    });
  }, [logs, today, range]);

  const weightPoints = data.filter(d => d.weight != null);
  const avgSleep = data.filter(d => d.sleep != null);
  const avgSleepVal = avgSleep.length ? (avgSleep.reduce((s, d) => s + d.sleep, 0) / avgSleep.length).toFixed(1) : "—";
  const totalMiles = data.reduce((s, d) => s + d.miles, 0).toFixed(1);
  const avgWater = data.length ? (data.reduce((s, d) => s + d.water, 0) / data.length).toFixed(1) : "—";

  return (
    <div className="px-4 pt-2 pb-4">
      <div className="text-center mb-4 pt-2">
        <div className="font-mono text-[11px] uppercase tracking-[0.2em] text-[#8B93A1] mb-1">Trends</div>
        <h1 className="font-serif text-[24px] text-[#F7F3EC]">Progress</h1>
      </div>

      <div className="flex gap-2 mb-4 justify-center">
        {[7, 14, 30].map(r => (
          <button key={r} onClick={() => setRange(r)} className="px-3 py-1.5 rounded-full text-[12px] font-medium"
            style={{ background: range === r ? "#D9622B" : "#2A3548", color: range === r ? "white" : "#8B93A1" }}>
            {r}d
          </button>
        ))}
      </div>

      <div className="grid grid-cols-3 gap-2 mb-4">
        <Card className="!p-3 text-center">
          <div className="font-mono text-[18px] text-[#1A2333]">{totalMiles}</div>
          <div className="text-[10px] text-[#8B93A1]">miles run</div>
        </Card>
        <Card className="!p-3 text-center">
          <div className="font-mono text-[18px] text-[#1A2333]">{avgSleepVal}h</div>
          <div className="text-[10px] text-[#8B93A1]">avg sleep</div>
        </Card>
        <Card className="!p-3 text-center">
          <div className="font-mono text-[18px] text-[#1A2333]">{avgWater}</div>
          <div className="text-[10px] text-[#8B93A1]">avg water cups</div>
        </Card>
      </div>

      <Card className="mb-4">
        <SectionLabel>Weight (lb)</SectionLabel>
        {weightPoints.length === 0 ? (
          <div className="text-[13px] text-[#8B93A1] py-4 text-center">No weight logged in this range yet</div>
        ) : (
          <div style={{ width: "100%", height: 160 }}>
            <ResponsiveContainer>
              <LineChart data={data}>
                <CartesianGrid strokeDasharray="3 3" stroke="#E5DECC" />
                <XAxis dataKey="date" tick={{ fontSize: 10, fill: "#8B93A1" }} />
                <YAxis domain={["auto", "auto"]} tick={{ fontSize: 10, fill: "#8B93A1" }} width={32} />
                <Tooltip contentStyle={{ fontSize: 12, borderRadius: 8 }} />
                <Line type="monotone" dataKey="weight" stroke="#D9622B" strokeWidth={2} dot={{ r: 3 }} connectNulls />
              </LineChart>
            </ResponsiveContainer>
          </div>
        )}
      </Card>

      <Card className="mb-4">
        <SectionLabel>Calories per day</SectionLabel>
        <div style={{ width: "100%", height: 160 }}>
          <ResponsiveContainer>
            <BarChart data={data}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E5DECC" />
              <XAxis dataKey="date" tick={{ fontSize: 10, fill: "#8B93A1" }} />
              <YAxis tick={{ fontSize: 10, fill: "#8B93A1" }} width={32} />
              <Tooltip contentStyle={{ fontSize: 12, borderRadius: 8 }} />
              <Bar dataKey="calories" fill="#6B8F71" radius={[4, 4, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div className="text-[11px] text-[#8B93A1] mt-1 text-center">Target: {targets.cal} cal/day</div>
      </Card>

      <Card className="mb-4">
        <SectionLabel>Sleep (hours)</SectionLabel>
        <div style={{ width: "100%", height: 140 }}>
          <ResponsiveContainer>
            <BarChart data={data}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E5DECC" />
              <XAxis dataKey="date" tick={{ fontSize: 10, fill: "#8B93A1" }} />
              <YAxis tick={{ fontSize: 10, fill: "#8B93A1" }} width={28} />
              <Tooltip contentStyle={{ fontSize: 12, borderRadius: 8 }} />
              <Bar dataKey="sleep" fill="#6B5BA0" radius={[4, 4, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </Card>

      <Card>
        <SectionLabel>Running mileage</SectionLabel>
        <div style={{ width: "100%", height: 140 }}>
          <ResponsiveContainer>
            <BarChart data={data}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E5DECC" />
              <XAxis dataKey="date" tick={{ fontSize: 10, fill: "#8B93A1" }} />
              <YAxis tick={{ fontSize: 10, fill: "#8B93A1" }} width={28} />
              <Tooltip contentStyle={{ fontSize: 12, borderRadius: 8 }} />
              <Bar dataKey="miles" fill="#D9622B" radius={[4, 4, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </Card>
    </div>
  );
}

      <div className="text-center mb-4 pt-2">
        <div className="font-mono text-[11px] uppercase tracking-[0.2em] text-[#8B93A1] mb-1">Logbook</div>
        <h1 className="font-serif text-[24px] text-[#F7F3EC]">History</h1>
      </div>
      {dates.length === 0 ? (
        <EmptyState icon={Calendar} title="No entries yet" body="Start logging from the Today tab and your history will appear here." />
      ) : (
        <div className="space-y-3">
          {dates.map(date => {
            const d = new Date(date + "T00:00:00");
            const dayLogs = logs[date];
            const cardio = dayLogs.cardio || [];
            const allMeals = [...(dayLogs.meals?.breakfast || []), ...(dayLogs.meals?.lunch || []), ...(dayLogs.meals?.dinner || []), ...(dayLogs.meals?.snacks || [])];
            const macros = sumMacros(allMeals);
            return (
              <button key={date} onClick={() => onSelectDay(date)} className="w-full text-left">
                <Card>
                  <div className="flex items-center justify-between mb-2">
                    <span className="font-serif text-[15px] text-[#1A2333]">{fmtDate(d)}</span>
                    <ChevronRight size={14} color="#8B93A1" />
                  </div>
                  <div className="flex gap-3 flex-wrap text-[12px] text-[#5C6470]">
                    {cardio.length > 0 && <span className="flex items-center gap-1"><Activity size={12} color="#D9622B" /> {cardio.length} activity</span>}
                    {dayLogs.strengthDone && <span className="flex items-center gap-1"><Dumbbell size={12} color="#5C6470" /> strength</span>}
                    {macros.cal > 0 && <span className="flex items-center gap-1"><Flame size={12} color="#B23A48" /> {Math.round(macros.cal)} cal</span>}
                    {dayLogs.water > 0 && <span className="flex items-center gap-1"><Droplet size={12} color="#3D7EA6" /> {dayLogs.water} cups</span>}
                    {dayLogs.sleep && <span className="flex items-center gap-1"><Moon size={12} color="#6B5BA0" /> {dayLogs.sleep}h</span>}
                    {dayLogs.weight && <span className="flex items-center gap-1"><Scale size={12} color="#8B93A1" /> {dayLogs.weight}lb</span>}
                  </div>
                  {dayLogs.note && <div className="text-[13px] text-[#1A2333] mt-2 italic line-clamp-2">"{dayLogs.note}"</div>}
                </Card>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------
   DAY DETAIL VIEW
--------------------------------------------------------- */
function DayDetailView({ date, logs, onBack, openLogger }) {
  const d = new Date(date + "T00:00:00");
  const dayLogs = logs[date] || {};
  const allMeals = [...(dayLogs.meals?.breakfast || []), ...(dayLogs.meals?.lunch || []), ...(dayLogs.meals?.dinner || []), ...(dayLogs.meals?.snacks || [])];
  const macros = sumMacros(allMeals);

  return (
    <div className="px-4 pt-2 pb-4">
      <button onClick={onBack} className="flex items-center gap-1 text-[#8B93A1] mb-3"><ChevronLeft size={16} /> <span className="text-[13px]">Back</span></button>
      <h1 className="font-serif text-[22px] text-[#F7F3EC] mb-4">{fmtDateLong(d)}</h1>
      <div className="space-y-3">
        <button onClick={() => openLogger("cardio", date)} className="w-full text-left">
          <Card>
            <div className="flex items-center gap-2 mb-1"><Activity size={16} color="#D9622B" /><span className="font-serif text-[15px] text-[#1A2333]">Cardio</span></div>
            {(dayLogs.cardio || []).length === 0 ? <div className="text-[13px] text-[#8B93A1]">Nothing logged · tap to add</div> :
              dayLogs.cardio.map(c => <div key={c.id} className="text-[13px] text-[#5C6470]">{c.activity} {c.distance && `· ${c.distance}mi`} {c.time && `· ${c.time}`}</div>)}
          </Card>
        </button>
        <button onClick={() => openLogger("strength", date)} className="w-full text-left">
          <Card>
            <div className="flex items-center gap-2 mb-1"><Dumbbell size={16} color="#5C6470" /><span className="font-serif text-[15px] text-[#1A2333]">Strength</span></div>
            <div className="text-[13px] text-[#8B93A1]">{dayLogs.strengthDone ? "Completed · tap to view" : "Not logged · tap to add"}</div>
          </Card>
        </button>
        <button onClick={() => openLogger("meals", date)} className="w-full text-left">
          <Card>
            <div className="flex items-center gap-2 mb-1"><UtensilsCrossed size={16} color="#B23A48" /><span className="font-serif text-[15px] text-[#1A2333]">Meals</span></div>
            {allMeals.length === 0 ? <div className="text-[13px] text-[#8B93A1]">Nothing logged · tap to add</div> :
              <div className="text-[13px] text-[#5C6470] font-mono">{Math.round(macros.cal)} cal · P{Math.round(macros.p)} C{Math.round(macros.c)} F{Math.round(macros.f)}</div>}
          </Card>
        </button>
        <div className="grid grid-cols-3 gap-2">
          <button onClick={() => openLogger("water", date)} className="text-left">
            <Card className="!p-3"><Droplet size={15} color="#3D7EA6" className="mb-1" /><div className="font-mono text-[16px] text-[#1A2333]">{dayLogs.water || 0}</div><div className="text-[11px] text-[#8B93A1]">water</div></Card>
          </button>
          <button onClick={() => openLogger("sleep", date)} className="text-left">
            <Card className="!p-3"><Moon size={15} color="#6B5BA0" className="mb-1" /><div className="font-mono text-[16px] text-[#1A2333]">{dayLogs.sleep ? `${dayLogs.sleep}h` : "—"}</div><div className="text-[11px] text-[#8B93A1]">sleep</div></Card>
          </button>
          <button onClick={() => openLogger("weight", date)} className="text-left">
            <Card className="!p-3"><Scale size={15} color="#8B93A1" className="mb-1" /><div className="font-mono text-[16px] text-[#1A2333]">{dayLogs.weight || "—"}</div><div className="text-[11px] text-[#8B93A1]">weight</div></Card>
          </button>
        </div>
        <button onClick={() => openLogger("note", date)} className="w-full text-left">
          <Card>
            <div className="flex items-center gap-2 mb-1"><Edit3 size={16} color="#8B93A1" /><span className="font-serif text-[15px] text-[#1A2333]">Comments</span></div>
            <div className="text-[13px] text-[#5C6470] whitespace-pre-wrap">{dayLogs.note || "Tap to add a comment about today"}</div>
          </Card>
        </button>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   MAIN APP
--------------------------------------------------------- */
function App() {
  const [today] = useState(getToday());
  const [tab, setTab] = useState("today");
  const [plan] = useState(() => buildDefaultPlan());
  const [library, setLibrary] = useState(DEFAULT_WORKOUT_LIBRARY);
  const [logs, setLogs] = useState({});
  const [targets, setTargets] = useState(DEFAULT_TARGETS);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null);
  const [detailDate, setDetailDate] = useState(null);

  useEffect(() => {
    (async () => {
      const savedLogs = await storageGet("training-logs", {});
      const savedLibrary = await storageGet("workout-library", DEFAULT_WORKOUT_LIBRARY);
      const savedTargets = await storageGet("macro-targets", DEFAULT_TARGETS);
      setLogs(savedLogs); setLibrary(savedLibrary); setTargets(savedTargets);
      setLoading(false);
    })();
  }, []);

  useEffect(() => { if (!loading) storageSet("training-logs", logs); }, [logs, loading]);
  useEffect(() => { if (!loading) storageSet("workout-library", library); }, [library, loading]);
  useEffect(() => { if (!loading) storageSet("macro-targets", targets); }, [targets, loading]);

  function openLogger(mode, date) { setModal({ mode, date: date || todayKey(today) }); }
  function saveDayLog(date, patch) {
    setLogs(prev => ({ ...prev, [date]: { ...(prev[date] || {}), ...patch } }));
  }

  const weekInfo = useMemo(() => plan.find(w => w.days.some(d => d.date === todayKey(today))), [plan, today]);

  if (loading) {
    return <div className="min-h-screen bg-[#1A2333] flex items-center justify-center"><div className="font-mono text-[#8B93A1] text-[13px]">Loading...</div></div>;
  }

  const TABS = [
    { id: "today", icon: Home, label: "Today" },
    { id: "plan", icon: Calendar, label: "Run Plan" },
    { id: "strength", icon: Dumbbell, label: "Strength" },
    { id: "nutrition", icon: UtensilsCrossed, label: "Nutrition" },
    { id: "progress", icon: TrendingUp, label: "Progress" },
  ];

  return (
    <div className="min-h-screen bg-[#1A2333] flex flex-col font-sans" style={{ fontFamily: "'Inter', system-ui, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
        .font-serif { font-family: 'Fraunces', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      `}</style>

      <div className="flex-1 overflow-y-auto max-w-md w-full mx-auto pb-2">
        {detailDate ? (
          <DayDetailView date={detailDate} logs={logs} onBack={() => setDetailDate(null)} openLogger={(mode, date) => openLogger(mode, date)} />
        ) : (
          <>
            {tab === "today" && <TodayView today={today} logs={logs} openLogger={openLogger} weekInfo={weekInfo} targets={targets} />}
            {tab === "plan" && <TrainingPlanView plan={plan} today={today} logs={logs} onSelectDay={setDetailDate} />}
            {tab === "strength" && <StrengthView logs={logs} today={today} openLogger={openLogger} />}
            {tab === "nutrition" && <NutritionView targets={targets} setTargets={setTargets} logs={logs} today={today} />}
            {tab === "progress" && <ProgressView logs={logs} today={today} targets={targets} />}
          </>
        )}
      </div>

      {!detailDate && (
        <div className="max-w-md w-full mx-auto bg-[#151D2B] border-t border-[#2A3548] flex items-center justify-around px-1 py-2 pb-safe">
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className="flex flex-col items-center gap-1 px-1.5 py-1.5 rounded-xl flex-1"
              style={{ color: tab === t.id ? "#D9622B" : "#5C6470" }}>
              <t.icon size={19} />
              <span className="text-[9.5px] font-medium">{t.label}</span>
            </button>
          ))}
        </div>
      )}

      {modal && (
        <LogModal mode={modal.mode} date={new Date(modal.date + "T00:00:00")} dayLogs={logs[modal.date] || {}}
          onClose={() => setModal(null)} onSave={(patch) => saveDayLog(modal.date, patch)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
